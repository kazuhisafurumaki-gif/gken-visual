<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>直線で分類する失敗例</title>
<style>
  *{box-sizing:border-box;}
  body{font-family:-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;background:#0f1226;color:#e8eaf6;margin:0;padding:24px;line-height:1.6;}
  h1{font-size:22px;margin:0 0 4px;} .sub{color:#9fa8da;font-size:14px;margin-bottom:18px;}
  .panel{background:#1a1f3d;border-radius:14px;padding:20px;margin-bottom:18px;box-shadow:0 4px 16px rgba(0,0,0,.3);}
  .row{display:flex;gap:30px;flex-wrap:wrap;align-items:flex-start;}
  canvas{background:#0a0d1f;border-radius:10px;}
  .ctrls{display:flex;flex-direction:column;gap:14px;min-width:250px;}
  button{background:#7c4dff;color:#fff;border:none;padding:11px 16px;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer;text-align:left;}
  button:hover{background:#9575ff;} button.on{background:#26a69a;}
  .legend{font-size:12px;color:#9fa8da;margin-top:10px;}
  .dot{display:inline-block;width:10px;height:10px;border-radius:50%;vertical-align:middle;margin-right:4px;}
  .prob{font-size:13px;background:#11142b;padding:10px 12px;border-radius:8px;}
  .bad{color:#ff6e6e;font-weight:bold;} .ok{color:#4caf50;font-weight:bold;} .hl{color:#ffd54f;font-weight:bold;}
  .note{font-size:13px;color:#9fa8da;margin-top:6px;}
  .acc{font-size:13px;color:#9fa8da;} .accv{font-size:22px;font-weight:bold;}
</style>
</head>
<body>
  <a href="00_目次.html" style="display:inline-block;margin:0 0 16px;color:#9fa8da;text-decoration:none;font-size:14px;background:#1a1f3d;padding:7px 16px;border-radius:8px;border:1px solid #2a3158;">← 目次へ戻る</a>
  <h1>📏💥 直線で分類すると…（失敗例）</h1>
  <div class="sub">同じ「勉強時間→合否」データに、無理やり直線（線形回帰）を当てはめてみる</div>

  <div class="panel">
    <div class="row">
      <div>
        <canvas id="cv" width="500" height="400"></canvas>
        <div class="legend">
          <span class="dot" style="background:#4caf50"></span>合格(正解=1)
          <span class="dot" style="background:#ff6e6e"></span>不合格(正解=0)
          <span class="dot" style="background:#ff8a65"></span>直線(線形回帰)
          <span class="dot" style="background:#ffd54f"></span>シグモイド(比較用)
        </div>
      </div>
      <div class="ctrls">
        <button id="tSig">🟡 シグモイドを重ねて比較</button>
        <button id="tOut">⚠️ 外れ値を追加（20時間で合格の人）</button>
        <div class="prob" id="probBox"></div>
        <div class="acc">直線での正答率：<span class="accv" id="accLin">—</span></div>
        <div class="note" id="note"></div>
      </div>
    </div>
  </div>

<script>
  const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
  const W=cv.width,H=cv.height,pad=50;
  const base=[[1,0],[1.5,0],[2,0],[2.5,0],[3,0],[2.8,1],[3.5,1],[4,0],[4.5,1],[5,1],[5.5,1],[6,1],[7,1],[8,1]];
  let showSig=false, showOut=false;
  const xMin=0,xMax=22, yMin=-0.4,yMax=1.5;
  const sx=x=>pad+(x-xMin)/(xMax-xMin)*(W-pad-20);
  const sy=p=>H-pad-(p-yMin)/(yMax-yMin)*(H-pad-30);
  const sig=(x,x0,k)=>1/(1+Math.exp(-k*(x-x0)));

  function lsq(d){const n=d.length;let sX=0,sY=0,sXY=0,sXX=0;for(const[x,y]of d){sX+=x;sY+=y;sXY+=x*y;sXX+=x*x;}const a=(n*sXY-sX*sY)/(n*sXX-sX*sX);return {a,b:(sY-a*sX)/n};}

  function draw(){
    const data= showOut? base.concat([[20,1]]) : base;
    ctx.clearRect(0,0,W,H);
    // ref lines 0,0.5,1
    ctx.font='11px sans-serif';
    [[0,'#2a3158','確率0 (不合格)'],[1,'#2a3158','確率1 (合格)'],[0.5,'#42a5f5','0.5 境界']].forEach(([p,c,t])=>{
      ctx.strokeStyle=c;ctx.lineWidth=p===0.5?2:1;ctx.setLineDash(p===0.5?[5,4]:[]);
      ctx.beginPath();ctx.moveTo(pad,sy(p));ctx.lineTo(sx(xMax),sy(p));ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle=c;ctx.fillText(t,4,sy(p)-3);
    });
    // impossible zones (>1 and <0) shading
    ctx.fillStyle='rgba(255,110,110,.10)';
    ctx.fillRect(pad,sy(yMax),W-pad-20,sy(1)-sy(yMax)); // above 1
    ctx.fillRect(pad,sy(0),W-pad-20,sy(yMin)-sy(0));    // below 0
    ctx.fillStyle='rgba(255,110,110,.55)';ctx.font='12px sans-serif';
    ctx.fillText('▲ ありえない確率（100%超）',sx(11),sy(1.25));
    ctx.fillText('▼ ありえない確率（マイナス）',sx(11),sy(-0.22));

    // linear regression line
    const {a,b}=lsq(data);
    ctx.strokeStyle='#ff8a65';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(sx(xMin),sy(a*xMin+b));ctx.lineTo(sx(xMax),sy(a*xMax+b));ctx.stroke();
    // linear's 0.5 crossing (decision boundary)
    const xCross=(0.5-b)/a;
    ctx.strokeStyle='#ff8a65';ctx.setLineDash([3,3]);ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(sx(xCross),sy(yMin));ctx.lineTo(sx(xCross),sy(0.5));ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='#ff8a65';ctx.fillText('直線の境界 '+xCross.toFixed(1)+'h',sx(xCross)-30,sy(yMin)+16);

    // sigmoid overlay
    if(showSig){
      ctx.strokeStyle='#ffd54f';ctx.lineWidth=3;ctx.beginPath();
      for(let i=0;i<=200;i++){const x=xMin+(xMax-xMin)*i/200;const Y=sy(sig(x,3.2,1.6));const X=sx(x);i?ctx.lineTo(X,Y):ctx.moveTo(X,Y);}
      ctx.stroke();
    }
    // points + linear accuracy
    let cor=0;
    for(const[x,y]of data){
      const pred=(a*x+b)>=0.5?1:0; if(pred===y)cor++;
      ctx.fillStyle=y===1?'#4caf50':'#ff6e6e';
      ctx.beginPath();ctx.arc(sx(x),sy(y),6,0,7);ctx.fill();
      if(pred!==y){ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.beginPath();ctx.arc(sx(x),sy(y),9,0,7);ctx.stroke();}
    }
    ctx.fillStyle='#5c6bc0';ctx.fillText('勉強時間→',sx(xMax)-54,H-16);

    // prob box: show line's prediction at 9h and 18h
    const p9=a*9+b, p18=a*18+b;
    document.getElementById('probBox').innerHTML=
      `直線が出す"確率"：<br>`+
      `・9時間 → <span class="${p9>1?'bad':'hl'}">${(p9*100).toFixed(0)}%</span>${p9>1?'（100%超え！）':''}<br>`+
      `・18時間 → <span class="${p18>1?'bad':'hl'}">${(p18*100).toFixed(0)}%</span>${p18>1?'（ありえない！）':''}`;
    document.getElementById('accLin').textContent=Math.round(cor/data.length*100)+'%';
    document.getElementById('note').innerHTML = showOut
      ? '⚠️ 外れ値1個で<span class="bad">直線が大きく傾き</span>、境界がズレて手前の人を誤分類。直線は外れ値に弱い。'
      : '直線は青0.5線を超えても止まらず<span class="bad">100%超やマイナス</span>に突き抜ける＝確率として破綻。';
  }
  document.getElementById('tSig').addEventListener('click',e=>{showSig=!showSig;e.target.classList.toggle('on',showSig);draw();});
  document.getElementById('tOut').addEventListener('click',e=>{showOut=!showOut;e.target.classList.toggle('on',showOut);draw();});
  draw();
</script>
</body>
</html>
