<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>物体検出 2段階 vs 1段階 ビジュアル</title>
<style>
  *{box-sizing:border-box;}
  body{font-family:-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;background:#0f1226;color:#e8eaf6;margin:0;padding:24px;line-height:1.6;}
  h1{font-size:22px;margin:0 0 4px;} .sub{color:#9fa8da;font-size:14px;margin-bottom:18px;}
  .panel{background:#1a1f3d;border-radius:14px;padding:20px;margin-bottom:18px;box-shadow:0 4px 16px rgba(0,0,0,.3);}
  .row{display:flex;gap:30px;flex-wrap:wrap;align-items:flex-start;}
  canvas{background:#0a0d1f;border-radius:10px;}
  .side{min-width:320px;flex:1;display:flex;flex-direction:column;gap:14px;}
  .ctrl label{font-size:13px;color:#9fa8da;display:block;margin-bottom:6px;}
  input[type=range]{width:100%;}
  .modes{display:flex;gap:10px;}
  .modes button{flex:1;background:#11142b;color:#9fa8da;border:1px solid #2a3158;border-radius:8px;padding:10px;font-size:14px;font-weight:bold;cursor:pointer;}
  .modes button.on{background:#7c4dff;color:#fff;border-color:#7c4dff;}
  .stage{font-size:18px;font-weight:bold;color:#ffd54f;}
  .desc{background:#11142b;padding:14px;border-radius:8px;font-size:14px;}
  .desc .hl{color:#ffd54f;font-weight:bold;}
  .cmp{font-size:12.5px;color:#9fa8da;border-collapse:collapse;width:100%;}
  .cmp td,.cmp th{border:1px solid #2a3158;padding:6px 8px;text-align:center;}
  .legend{font-size:12px;color:#9fa8da;margin-top:8px;}
</style>
</head>
<body>
  <a href="00_目次.html" style="display:inline-block;margin:0 0 16px;color:#9fa8da;text-decoration:none;font-size:14px;background:#1a1f3d;padding:7px 16px;border-radius:8px;border:1px solid #2a3158;">← 目次へ戻る</a>
  <h1>🔫 物体検出 — 2段階方式 vs 1段階方式</h1>
  <div class="sub">方式を切り替え、処理ステップを進めて違いを体感。R-CNN系（2段階）は「候補→分類」、YOLO/SSD（1段階）は「一度に」。</div>

  <div class="panel">
    <div class="row">
      <div>
        <canvas id="cv" width="440" height="300"></canvas>
        <div class="legend" id="legend"></div>
      </div>
      <div class="side">
        <div class="modes">
          <button id="bRcnn" class="on">2段階方式（R-CNN系）</button>
          <button id="bYolo">1段階方式（YOLO/SSD）</button>
        </div>
        <div class="ctrl">
          <label>処理ステップ</label>
          <input id="step" type="range" min="0" max="3" step="1" value="0">
        </div>
        <div class="stage" id="stage"></div>
        <div class="desc" id="desc"></div>
        <table class="cmp">
          <tr><th></th><th>2段階(R-CNN系)</th><th>1段階(YOLO/SSD)</th></tr>
          <tr><td>流れ</td><td>候補抽出→分類</td><td>位置＋分類を同時</td></tr>
          <tr><td>速度</td><td>遅め🐢</td><td>高速🐇</td></tr>
          <tr><td>精度</td><td>高め</td><td>やや劣る(改善中)</td></tr>
          <tr><td>代表</td><td>R-CNN/Fast/Faster, FPN</td><td>YOLO, SSD</td></tr>
        </table>
      </div>
    </div>
  </div>

<script>
  const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
  const W=cv.width,H=cv.height,GROUND=215;
  const objs=[
    {type:'cat',name:'猫',cx:120,cy:172,rx:38,ry:31,col:'#ff9800'},
    {type:'dog',name:'犬',cx:315,cy:178,rx:50,ry:40,col:'#42a5f5'},
  ];
  function bbox(o){return [o.cx-o.rx-6,o.cy-o.ry-13,(o.rx+6)*2,(o.ry+13)*2];}
  // 疑似乱数（seed固定でちらつかない）
  function rnd(n){const x=Math.sin(n*12.9898)*43758.5453;return x-Math.floor(x);}

  function drawScene(){
    ctx.fillStyle='#0a0d1f';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='rgba(79,195,247,.05)';ctx.fillRect(0,0,W,GROUND);
    ctx.fillStyle='rgba(102,187,106,.06)';ctx.fillRect(0,GROUND,W,H-GROUND);
    ctx.strokeStyle='#1c2347';ctx.beginPath();ctx.moveTo(0,GROUND);ctx.lineTo(W,GROUND);ctx.stroke();
    for(const o of objs) drawAnimal(o);
  }
  function drawAnimal(o){
    ctx.save();ctx.fillStyle='#cfd3e8';
    ctx.beginPath();ctx.ellipse(o.cx,o.cy,o.rx,o.ry,0,0,7);ctx.fill();
    const hx=o.cx,hy=o.cy-o.ry*0.9,hr=o.rx*0.62;
    ctx.beginPath();ctx.arc(hx,hy,hr,0,7);ctx.fill();ctx.beginPath();
    if(o.type==='cat'){ctx.moveTo(hx-hr*0.7,hy-hr*0.5);ctx.lineTo(hx-hr*0.3,hy-hr*1.3);ctx.lineTo(hx-hr*0.05,hy-hr*0.6);
      ctx.moveTo(hx+hr*0.7,hy-hr*0.5);ctx.lineTo(hx+hr*0.3,hy-hr*1.3);ctx.lineTo(hx+hr*0.05,hy-hr*0.6);ctx.fill();}
    else{ctx.ellipse(hx-hr*0.85,hy,hr*0.32,hr*0.6,0.3,0,7);ctx.fill();ctx.beginPath();ctx.ellipse(hx+hr*0.85,hy,hr*0.32,hr*0.6,-0.3,0,7);ctx.fill();}
    ctx.fillStyle='#0a0d1f';ctx.beginPath();ctx.arc(hx-hr*0.32,hy,hr*0.13,0,7);ctx.arc(hx+hr*0.32,hy,hr*0.13,0,7);ctx.fill();
    ctx.restore();
  }
  function tag(x,y,text,color){ctx.font='bold 12px sans-serif';const w=ctx.measureText(text).width+10;
    ctx.fillStyle=color;ctx.fillRect(x,y-15,w,16);ctx.fillStyle='#0a0d1f';ctx.fillText(text,x+5,y-3);}

  let mode='rcnn';
  const TXT={
    rcnn:[
      {s:'Step0: 入力画像',d:'これから物体を検出する。<span class="hl">2段階方式</span>は「候補を出す→分類する」の2ステップ。'},
      {s:'Step1: 候補領域を提案',d:'<span class="hl">Selective Search</span>(古典)や<span class="hl">RPN</span>(Faster R-CNN)で、物体がありそうな枠を<span class="hl">大量に</span>出す。'},
      {s:'Step2: 各候補をCNNで分類',d:'候補1つずつをCNNにかけ、クラスとスコアを判定。<span class="hl">候補が多いほど遅い</span>のが弱点。'},
      {s:'Step3: 高スコアのみ残す',d:'スコアの高い枠だけ残して完成。<span class="hl">精度は高い</span>が、2段階ぶん時間がかかる。'},
    ],
    yolo:[
      {s:'Step0: 入力画像',d:'<span class="hl">1段階方式</span>は候補抽出をせず、<span class="hl">位置とクラスを一度に</span>予測する。'},
      {s:'Step1: グリッド分割',d:'画像を格子(グリッド)に分割。各セルが「自分の担当領域に物体があるか」を見る。<span class="hl">You Only Look Once</span>。'},
      {s:'Step2: 各セルがBBox＋クラスを同時予測',d:'物体の中心があるセルが、BBoxとクラスを<span class="hl">1回の推論で</span>直接出力。'},
      {s:'Step3: NMSで重複除去',d:'重なった枠を<span class="hl">NMS</span>(Non-Maximum Suppression)で1つに整理して完成。<span class="hl">高速</span>。'},
    ]
  };

  function draw(){
    const step=+document.getElementById('step').value;
    drawScene();let legend='';
    if(mode==='rcnn'){
      if(step===1||step===2){
        // 候補領域を多数（疑似ランダム、物体周辺に密）
        const N=step===1?26:26;
        for(let i=0;i<N;i++){
          const near=i%2===0; const base=objs[i%2];
          let x,y,w,h;
          if(i<22){const o=objs[i%2];x=o.cx-o.rx+ (rnd(i+1)-0.5)*90;y=o.cy-o.ry+(rnd(i+9)-0.5)*70;
            w=o.rx*1.4+(rnd(i+3)-0.5)*40;h=o.ry*1.5+(rnd(i+5)-0.5)*40;}
          else{x=rnd(i*2)*W*0.8;y=rnd(i*3)*GROUND;w=40+rnd(i)*60;h=40+rnd(i+7)*50;}
          ctx.strokeStyle='rgba(255,213,79,.5)';ctx.lineWidth=1;ctx.strokeRect(x,y,Math.abs(w),Math.abs(h));
          if(step===2){ctx.fillStyle='rgba(255,213,79,.85)';ctx.font='9px sans-serif';
            ctx.fillText((rnd(i+4)).toFixed(2),x+2,y+10);}
        }
        legend=step===1?'黄枠＝候補領域（大量に提案）':'各候補にスコアを付けて分類中…';
      }else if(step===3){
        for(const o of objs){const[x,y,w,h]=bbox(o);ctx.strokeStyle=o.col;ctx.lineWidth=3;ctx.strokeRect(x,y,w,h);
          tag(x,y,o.name+' '+(0.9+rnd(o.cx)*0.09).toFixed(2),o.col);}
        legend='高スコアの枠だけ残して完成（2段階：候補→分類）';
      }else legend='入力画像';
    }else{ // yolo
      if(step>=1){
        const cols=8,rows=6,cw=W/cols,ch=H/rows;
        ctx.strokeStyle='rgba(124,77,255,.45)';ctx.lineWidth=1;
        for(let i=1;i<cols;i++){ctx.beginPath();ctx.moveTo(i*cw,0);ctx.lineTo(i*cw,H);ctx.stroke();}
        for(let j=1;j<rows;j++){ctx.beginPath();ctx.moveTo(0,j*ch);ctx.lineTo(W,j*ch);ctx.stroke();}
        // 物体中心セルを強調
        for(const o of objs){const ci=Math.floor(o.cx/cw),cj=Math.floor(o.cy/ch);
          ctx.fillStyle='rgba(124,77,255,.30)';ctx.fillRect(ci*cw,cj*ch,cw,ch);}
        legend='紫グリッド＝画像分割。色付きセル＝物体の中心がある担当セル';
      }
      if(step===2){
        for(const o of objs){const[x,y,w,h]=bbox(o);
          for(let k=0;k<3;k++){ctx.strokeStyle='rgba(255,213,79,.5)';ctx.lineWidth=1;
            ctx.strokeRect(x+(rnd(o.cx+k)-0.5)*22,y+(rnd(o.cy+k)-0.5)*22,w+(rnd(k)-0.5)*30,h+(rnd(k+3)-0.5)*30);}}
        legend='担当セルがBBox候補＋クラスを同時に予測（複数枚）';
      }
      if(step===3){
        for(const o of objs){const[x,y,w,h]=bbox(o);ctx.strokeStyle=o.col;ctx.lineWidth=3;ctx.strokeRect(x,y,w,h);
          tag(x,y,o.name+' '+(0.85+rnd(o.cx)*0.12).toFixed(2),o.col);}
        legend='NMSで重複を除去して完成（1段階：一度に検出）';
      }
      if(step===0)legend='入力画像';
    }
    document.getElementById('legend').innerHTML=legend;
    document.getElementById('stage').textContent=TXT[mode][step].s;
    document.getElementById('desc').innerHTML=TXT[mode][step].d;
  }
  function setMode(m){mode=m;
    document.getElementById('bRcnn').classList.toggle('on',m==='rcnn');
    document.getElementById('bYolo').classList.toggle('on',m==='yolo');draw();}
  document.getElementById('bRcnn').onclick=()=>setMode('rcnn');
  document.getElementById('bYolo').onclick=()=>setMode('yolo');
  document.getElementById('step').addEventListener('input',draw);
  draw();
</script>
</body>
</html>
