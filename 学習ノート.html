# G検定 学習ノート — CNN周辺（2026-06-15）

ディープラーニングの手法（ch5）のうち **CNN周辺** を一周した日のまとめ。
覚えるリスト → 弱点リスト → 一問一答 の順。

---

## 🎯 覚えるリスト（最重要）

### CNNの基本
- CNN = 主に**画像**を扱うNN。全結合より**パラメータ少**＆**空間構造を保てる**
- 3つの層：
  - **畳み込み層**＝フィルタで特徴抽出（学習パラメータ**あり**）
  - **プーリング層**＝縮小・集約（学習パラメータ**なし**）
  - **全結合層**＝最後に分類（学習パラメータ**あり**）
- 流れ：`畳み込み→活性化→プーリング を繰り返す → 平坦化 → 全結合 → 出力(ソフトマックス)`
- 前半=特徴抽出係 / 後半=判断係

### 畳み込みの用語
- **フィルタ（＝カーネル）**：スライドさせて特徴抽出。数値が学習対象。1フィルタ=1特徴
- **ストライド**：フィルタをずらす間隔（大きいほど出力小）
- **パディング**：入力の周囲を0で埋める。出力が小さくなりすぎるのを防ぐ
- **出力サイズ公式**：`出力 = (入力 + 2×パディング − フィルタ) ÷ ストライド + 1`
  - 例：入力5・フィルタ3・ストライド1・パディング0 → (5−3)/1+1 = **3**
  - パディング1なら (5+2−3)/1+1 = 5 で**入力と同じサイズを維持**

### プーリング
- **最大値プーリング(Max)**＝最頻出 / **平均値プーリング(Average)**
- **グローバルアベレージプーリング(GAP)**＝各チャンネル全体の平均→全結合の代わり
- 効能＝**位置不変性**（物体が多少ズレても同じ特徴を拾える）
- **学習パラメータなし**

### 活性化関数
- **ReLU** … 正で微分**常に1**→勾配消失に強い。隠れ層の主流（AlexNet以降）
- **シグモイド** … 0〜1、微分の最大0.25 → **勾配消失の主犯**
- **tanh** … −1〜1、0中心。端では勾配消失
- **ソフトマックス** … 出力層専用。多クラス分類の**確率**（合計1）
- 発展：**Leaky ReLU**（負でもわずかな傾き＝死んだニューロン対策）

### 勾配消失
- 深い層で誤差(勾配)が入力側に届くほど0に近づき学習が進まない現象
- 原因：逆伝播で1未満を掛け続ける（シグモイドの微分0.25等）
- 対策：**ReLU / バッチ正規化 / スキップ結合(ResNet) / 適切な初期化 / LSTM**

### バッチ正規化
- ミニバッチ単位で**平均0・分散1に正規化**＋γ・βで微調整（γ・βは学習パラメータ）
- 主目的＝**学習の高速化・安定化**（勾配消失も緩和）。過学習抑制は**副次効果**

### 有名CNNアーキテクチャ（物語で）
| 年 | 名前 | キーワード |
|---|---|---|
| 1998 | **LeNet** | 元祖・手書き数字・ルカン |
| 2012 | **AlexNet** | ILSVRC優勝・**第3次AIブームの火付け役**・ReLU/ドロップアウト |
| 2014 | **VGG** | 3×3を**深く積む**・シンプル・転移学習定番 |
| 2014 | **GoogLeNet** | **Inception**・**1×1畳み込みで次元削減** |
| 2015 | **ResNet** | **スキップ結合(残差)**・**152層**・勾配消失対策 |

### 正則化・過学習対策
- **過学習**＝訓練精度↑なのに検証精度↓（その差が過学習のサイン）
- **L1正則化(ラッソ)** … 絶対値の罰則・重みを**ぴったり0**に・**特徴選択**
- **L2正則化(リッジ/荷重減衰)** … 2乗の罰則・重みを**全体的に小さく**（0にはしない）
- **ドロップアウト** … 学習時にニューロンを**ランダムに無効化**。**推論時は全部使う**
- **早期終了** … **検証誤差が悪化に転じたら**学習を止める
- **データ拡張** … **入力を加工して水増し**（反転/回転/クロップ/色変換）。**ラベルは死守**

## ⚠️ 弱点リスト（間違えた／紛れ当たり → 重点復習）

1. **「最も不適切なものを選べ」の読み落とし**
   - 正しい選択肢に引っ張られて失点した。設問形式を最初に確認するクセを。
   - → 2回目のクイズでは克服済み（正則化問5を正解）。引き続き注意。

2. **ドロップアウト vs バッチ正規化**
   - 「ランダムに無効化」→**ドロップアウト** / 「平均・分散で整える」→**バッチ正規化**
   - 一度間違えたが克服済み。合言葉で固定。

3. **ResNet vs GoogLeNet**
   - 「スキップ結合・152層・勾配消失」→**ResNet** / 「Inception・1×1畳み込み」→**GoogLeNet**
   - 克服済み。物語で記憶。

4. **活性化関数の区別（紛れ当たり）**
   - 「正で微分1・隠れ層」→ReLU / 「確率・出力層」→ソフトマックス / 「勾配消失の犯人」→シグモイド

5. **出力サイズ計算（最初わからず）**
   - 公式を丸暗記。値を拾えば必ず解ける得点源。パディングの2倍を足し忘れない。

6. **データ拡張の範囲（最初わからず）**
   - 加工していいのは**入力だけ**。ラベル付け替えはNG。やりすぎて意味が変わる加工もNG（6を180度→9問題）。

- 入力を加工して水増しする手法は？ → **データ拡張**

# 【追記】RNN・Transformer・オートエンコーダ編（同日 ch5 後半）

## 🎯 覚えるリスト

### RNN（再帰型ニューラルネットワーク）
- 系列データ（自然言語・時系列・音声）を扱う。**回帰結合（=再帰結合/リカレント結合）**で前の情報を保持
- 学習法＝**BPTT（BackPropagation Through Time）**：時間をさかのぼって誤差を伝播
- 弱点＝**長期依存性の問題（勾配消失）**：長い系列だと昔を忘れる
- 初期のRNN：**エルマンネットワーク**（隠れ層の出力を戻す）/ **ジョルダンネットワーク**（出力層の出力を戻す）
- ⚠️ **Transformerは回帰結合を持たない＝RNNではない**

### LSTM / GRU
- **LSTM**＝ゲート機構で長期依存を学習。構成要素＝**CEC（Constant Error Carousel／セル状態）＋ゲート機構**
  - **セル状態（C）＝長期記憶の本流（ベルトコンベア）**。足し算的に微更新するので薄まらない
  - **隠れ状態（h）＝その時の出力（作業用）**。Cから出力ゲートで取り出す
  - 3つのゲート：**忘却ゲート**（捨てる）/ **入力ゲート**（足す）/ **出力ゲート**（取り出す）
- **GRU**＝LSTMの簡略版。ゲート2つ（リセット/更新）で軽量・高速
- **双方向RNN（BiRNN）**＝前方向＋後方向の両方から読む
- **seq2seq（Encoder-Decoder）**＝可変長入力→可変長出力。機械翻訳。**デコーダもRNN**
- **教師強制（teacher forcing）**＝学習時、前時刻の「正解」を現在の入力に使う→高速・安定。本番は正解がなく挙動がズレる（exposure bias）

### Transformer / Attention（2017「Attention Is All You Need」）
- **RNNを使わずAttentionのみ**→並列計算でGPU高速・長距離依存に強い。BERT/GPTの土台
- Attentionの種類：
  - **Self-Attention**＝同じ系列内の単語間の関連
  - **Source-Target Attention**＝2系列間の対応
  - **Multi-Head Attention**＝Self-Attentionを並列に複数
- **query・key・value**＝Attention（注目度）の計算に使う部品（検索エンジンのたとえ：query=検索語/key=見出し/value=中身）
- **位置エンコーディング**＝並列処理で消える語順を補う。※q/k/vの計算とは別物

### オートエンコーダ / VAE
- **オートエンコーダ**＝入力を圧縮→復元するNN。**中間層を入力より小さく（ボトルネック）**して特徴抽出・次元削減。教師なし的。用途：次元削減・異常検知・事前学習
- **積層オートエンコーダ**＝AEを積んで層ごとに**事前学習**（pre-training）し深いネットを構築
- **VAE（変分オートエンコーダ）**＝中間層を**確率分布**で表し、サンプリングで**新データ生成**＝生成モデル（画像生成）
- VAE派生（全部VAE系）：**β-VAE**（潜在変数を解釈可能に）/ **VAE/GAN** / **InfoVAE** / **VQ-VAE**（潜在変数を離散化）

### 統合年表（CNN系×RNN系）
- LeNet(1998)・LSTM(1997) → **AlexNet(2012)で第3次AIブーム点火** → 深くしたいが勾配消失 → **CNNはスキップ結合(ResNet)/RNNはゲート(LSTM)で突破** → RNN系から**Transformer(2017)** → BERT/GPT＆Vision Transformerで合流
- 共通の敵＝**勾配消失**。対策が系列で違う（CNN=スキップ結合 / RNN=ゲート）

### データ拡張（細かい用語）
- 画像：**Random Flip**（反転）/ Random Crop（切り抜き）/ Random Erasing・Cutout（一部を隠す）/ Mixup・CutMix（合成）
- テキスト：Paraphrasing（類似語置換）/ Noising（軽くランダムに入替・削除・挿入・置換）/ Sampling（分布推定して生成）
- **RandAugment**(2019 Google)＝使う手法はランダム、でも**「個数」も「強度」も一定**に固定して探索を効率化

---

## ⚠️ 弱点リスト（本日の重点復習）★最重要は1番

1. **【最重要・繰り返し失点】「最も不適切なものを選べ」で正しい選択肢を選んでしまう**
   - 正則化・RNNでは攻略できたが、終盤（問23）で再発。集中力切れで出やすい。
   - **対策3ステップ**：①「間違い探しモード」と唱える ②各選択肢を1個ずつ○×判定 ③×（誤った文）を選ぶ／○には手を出さない
   - 「持たない」「苦手」「〜のみ」「多い」など**断定・否定語は誤り選択肢のサイン**→一度疑う

2. **セル状態（C）vs 隠れ状態（h）**：長期記憶の本流＝**セル状態**。隠れ状態は出力（作業用）。「長期記憶を保持する経路」と来たらC。

3. **回帰結合 vs 全結合**：RNNの再帰的結合は**回帰結合**（全結合ではない）。

4. **Transformer＝RNNではない**：回帰結合を持たずAttentionのみ。RNNの仲間を聞かれてTransformerが入っていたら除外。

5. **query/key/value＝Self-Attentionの計算部品**（位置エンコーディングではない！）。位置エンコーディング＝語順の補完。

6. **オートエンコーダの中間層は「入力より小さく」**（ボトルネックで圧縮→特徴抽出）。

7. **RandAugment＝個数も強度も「一定」**、選ぶ手法だけランダム。

8. **教師強制＝前時刻の「正解」を現在の入力に使う**（新出用語）。

9. 新出で押さえる名前：**エルマン/ジョルダンネットワーク、CEC、exposure bias、β-VAE/VAE-GAN/InfoVAE/VQ-VAE**。

- 前時刻の正解を入力に使う学習法は？ → **教師強制**
- RNNを使わずAttentionのみのモデルは？ → **Transformer**

- 第3次AIブームの火付け役と年は？ → **AlexNet・2012**

# 【追記】機械学習 全体マップ（ch3復習・分類の地図）

## 大分類3つ（幹）
- **① 教師あり学習**：正解ラベルあり。問題と答えのセットで学ぶ
- **② 教師なし学習**：正解ラベルなし。データの構造を自分で見つける
- **③ 強化学習**：試行錯誤で報酬を最大化。行動して学ぶ

## 見分けフロー
- 正解ラベルを使って予測？ → ① 教師あり
- ラベルなしでグループ分け/要約？ → ② 教師なし
- 行動して報酬を最大化？ → ③ 強化学習

## 各手法の置き場所（★は今日つまずいた所）
| 手法 | 分類 |
|---|---|
| 線形回帰 | ① 教師あり・回帰 |
| ロジスティック回帰 | ① 教師あり・**分類**（名前は回帰だが分類！） |
| SVM / 決定木 / ランダムフォレスト / k-NN | ① 教師あり・分類 |
| **k-means** | ② 教師なし・クラスタリング（非階層・クラスタ数を事前に決める） |
| **ウォード法** ★ | ② 教師なし・クラスタリング（**階層的**・樹形図／統合後のばらつき最小で統合） |
| **PCA（主成分分析）** | ② 教師なし・次元削減 |
| **協調フィルタリング** | ② 教師なし・レコメンド（似た"ユーザー"同士で推薦。商品の中身で推薦するのはコンテンツベース） |
| マルコフ決定過程（MDP） | ③ 強化学習（次状態は現在の状態だけで決まる＝マルコフ性） |
| **多腕バンディット / ε-greedy / UCB** ★ | ③ 強化学習（探索と活用のバランス。方策勾配法・REINFORCEは別カテゴリ） |

## アンサンブル学習（①教師ありで使うテクニック）
- **バギング**：並列・独立に学習→多数決/平均。分散↓（過学習に強い）。代表＝**ランダムフォレスト**。Bootstrap Aggregating の略
- **ブートストラップサンプリング**：重複を許してデータ抽出する"部品"（バギングの中で使う）
- **ブースティング**：逐次・前の誤りを次が補正。バイアス↓（精度高い）。代表＝**XGBoost/AdaBoost**
- 合言葉：「並列・多数決→バギング」「逐次・誤り補正→ブースティング」

## ひっかけ注意
- ロジスティック回帰＝分類（教師あり）
- k-means（非階層）vs ウォード法（階層的）は兄弟
- ランダムフォレスト/SVMは教師あり（教師なしと間違えやすい）
- 多腕バンディットは強化学習の枝（ε-greedy・UCB）

# 【追記】AIの3つのブーム（ch2・歴史で覚える）

主役が「探索 → 知識 → 学習」と乗り換わる物語。CNN/RNNと同じく歴史で覚えられる。

| ブーム | 時期 | 主役 | キーワード／代表 |
|---|---|---|---|
| **第1次** | 1950s〜60s | **探索・推論** | 迷路・パズルを解く。トイ・プロブレムの壁→冬の時代。**イライザ(ELIZA)**=人工無脳の元祖もこの頃 |
| **第2次** | 1980s | **知識** | **エキスパートシステム**（マイシンMYCIN／DENDRAL）。知識ベースに知識を詰める。知識獲得のボトルネック→冬 |
| **第3次** | 2010s〜現在 | **機械学習・深層学習** | データから学習。**AlexNet(2012)** で点火。←今ここ |

## ひっかけ整理
- イライザ＝**第1次**（1964-66）。「第二次ブームでイライザ開発」は誤り
- マイシン/DENDRAL（エキスパートシステム）＝**第2次**
- AlexNet＝**第3次**（2012）

## 深層学習に至る手法の流れ（少しだけ歴史）
**パーセプトロン(1958)** → XOR問題で批判 → **誤差逆伝播(1986)で多層化** → **SVM等が主流(1990s〜2000s)** → **2012 AlexNetで深層学習が爆発**

# 【追記】教師あり/なし/強化の覚え方（「先生」のたとえ）

名前に「教師」が入っているので、**先生がいるか・何で学ぶか**で覚える。

| 種類 | 先生は？ | 学び方（たとえ） | サブ分類と代表手法 |
|---|---|---|---|
| **① 教師あり** | いる（各問題に正解を教えてくれる） | **過去問（問題＋答え）で勉強** | 分類：SVM/決定木/ランダムフォレスト/ロジスティック回帰 ／ 回帰：線形回帰 |
| **② 教師なし** | いない（答えがない） | **答えのないデータを自分で整理** | クラスタリング：k-means(非階層)/ウォード法(階層的) ／ 次元削減：PCA ／ レコメンド：協調フィルタリング |
| **③ 強化学習** | いない（が結果に報酬/罰） | **やってみて、褒められたら繰り返す（犬のしつけ）** | MDP/多腕バンディット/ε-greedy/UCB/Q学習 |

合言葉：**「答えを教わる＝教師あり」「自分で整理＝教師なし」「ごほうびで学ぶ＝強化学習」**

# 【追記】教師あり学習の各手法（深掘り・全ビジュアル付き）

## 大枠：教師あり ＝ 分類（カテゴリ当て）＋ 回帰（数値当て）
- どの手法も「正解ラベル付きデータ」で学ぶ。「正解とのズレを減らす／正解できれいに分ける」
- 多くの手法（決定木・RF・勾配ブースティング）は**分類も回帰も両刀**。見せる例で変わるだけ

## 各手法
| 手法 | 一言 | キーワード | 分類/回帰 |
|---|---|---|---|
| **線形回帰** | 直線を当てはめ数値予測 | **最小二乗法**（誤差の二乗和を最小化／二乗は正負の打ち消し防止） | 回帰 |
| **ロジスティック回帰** | 確率を出して0.5で分類 | **シグモイドで0〜1の確率**。名前は回帰だが**分類**。多クラスはソフトマックス | 分類 |
| **SVM** | 余裕をもって境界を引く | **マージン最大化・サポートベクター・カーネルトリック**。DL前の主役 | 分類(回帰版SVRも) |
| **決定木** | YES/NOの枝分かれ | **ジニ不純度・エントロピー(情報利得)**で分割／**解釈性◎**／過学習しやすい→枝刈り | 両方 |
| **ランダムフォレスト** | 木の多数決 | **決定木×バギング**（並列）。ブートストラップ＋特徴ランダム選択で木を多様化 | 両方 |
| **勾配ブースティング** | 木で誤り(残差)を逐次補正 | **決定木×ブースティング**（逐次）。XGBoost/LightGBM。高精度／学習率で調整 | 両方 |
| **k-NN** | 近所の多数決 | **怠惰学習**／kの大小（小=過学習,大=なめらか）／**要スケーリング**／k-meansと別物 | 両方 |

## 線形回帰 vs ロジスティック回帰（重要）
- 2値（合格/不合格）は連続的に増減しない＝直線で予測すると確率が100%超やマイナスに突き抜けて破綻
- だから「合格"確率"を頭打ちするS字（シグモイド）で予測→0.5で線引き」＝ロジスティック回帰
- 「○○確率を出したい2値問題」はロジスティック回帰がベストフィット（例：出資額→倒産確率、与信審査）

## アンサンブル学習（2大巨頭）
- **バギング** ＝ **①ブートストラップ**(袋からガラガラ・重複OK抽出) ＋ **②アグリゲイティング**(集約=多数決/平均)。並列・独立。代表＝**ランダムフォレスト**。狙い＝分散↓(過学習に強い)
- **ブースティング** ＝ 逐次・前の誤りを次が補正。狙い＝精度↑
  - **AdaBoost**（元祖／間違えたデータの重みを上げる）
  - **勾配ブースティング**（残差を予測する木を足す）→ XGBoost/LightGBM/CatBoost
- 合言葉：**「並列・多数決→バギング(RF)」「逐次・誤り補正→ブースティング(XGBoost)」**
- どちらも汎用テクニックだが**決定木と組むのが定番**（決定木は不安定＝分散大→アンサンブルが効く）

## 重要な大前提：汎化とドメインシフト
- バギング/RFが上げる**汎化性能**＝「**同じ傾向の未知データ**」への強さ（例：Eコマースの新規客）
- **別ドメイン**（例：Eコマース→テレビショッピングは客層が違う）には、どんなモデルも弱い＝**ドメインシフト**
- 対策：そのドメインのデータで学習し直す／**転移学習(Transfer Learning)**で少量データで適応（弊社YOLOv8もImageNet→トランプへ転移学習）

# 【追記】評価指標（教師あり学習とセットで超頻出）

## 混同行列（2次元＝「実際(正解)」×「予測(モデルの判定)」）
| | 予測:陽性(該当する) | 予測:陰性(該当しない) |
|---|---|---|
| **実際:陽性** | **TP**真陽性(当たり) | **FN**偽陰性(見逃し) |
| **実際:陰性** | **FP**偽陽性(巻き込み) | **TN**真陰性(当たり) |

- 名前の読み方：**後ろ(陽性/陰性)＝モデルが該当ありと言ったか** ＋ **前(真/偽)＝その判定が当たり(真)か外れ(偽)か**
- 2次元にする理由＝**間違いには2種類ある（見逃しFN／巻き込みFP）のを区別したいから**。1軸(正解率)だと両者が混ざる

## 指標
- **正解率(Accuracy)** = (TP+TN)/全部。※**不均衡データでは当てにならない**（全部陰性でも高く出る）
- **適合率(Precision)** = TP/(TP+**FP**)。陽性判定のうち本当に陽性の割合（巻き込みの少なさ）
- **再現率(Recall)** = TP/(TP+**FN**)。本当の陽性のうち捕まえた割合（見逃しの少なさ）= **TPR**と同じ
- **F値(F1)** = 適合率と再現率の調和平均（バランス）
- 適合率↔再現率は**トレードオフ**（しきい値を下げると再現率↑適合率↓）
- 分母で区別：適合率=TP+FP / 再現率=TP+FN / FPR=FP+TN

## ROC曲線・AUC
- **ROC曲線**：横軸=**FPR(偽陽性率=FP/(FP+TN)・巻き込み率)**、縦軸=**TPR(真陽性率=再現率)**。しきい値を全部試した軌跡
- **左上に張り出すほど良い**（TPR高・FPR低）
- **AUC**＝曲線の下の面積。**1に近いほど良い（曲線が左上の角に張り付く＝赤青がきれいに分離）／0.5＝でたらめ(対角線)**
- AUCの利点＝**しきい値に依存しないモデルの総合実力**
- まとめの流れ：混同行列 → 適合率・再現率(一点の評価) → ROC(全しきい値の軌跡) → AUC(総合実力の数字)
