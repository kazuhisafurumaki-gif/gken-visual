<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUCの大きさ ビジュアル</title>
<style>
  *{box-sizing:border-box;}
  body{font-family:-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;background:#0f1226;color:#e8eaf6;margin:0;padding:24px;line-height:1.6;}
  h1{font-size:22px;margin:0 0 4px;} .sub{color:#9fa8da;font-size:14px;margin-bottom:18px;}
  .panel{background:#1a1f3d;border-radius:14px;padding:20px;margin-bottom:18px;box-shadow:0 4px 16px rgba(0,0,0,.3);}
  .row{display:flex;gap:30px;flex-wrap:wrap;align-items:flex-start;}
  canvas{background:#0a0d1f;border-radius:10px;}
  .side{min-width:280px;display:flex;flex-direction:column;gap:14px;}
  .ctrl label{font-size:13px;color:#9fa8da;display:block;margin-bottom:4px;}
  input[type=range]{width:280px;} .v{color:#fff;font-weight:bold;font-size:16px;}
  .aucbig{font-size:40px;font-weight:bold;color:#4caf50;}
  .note{font-size:13px;color:#9fa8da;} .hl{color:#ffd54f;font-weight:bold;}
  .legend{font-size:12px;color:#9fa8da;margin-top:8px;}
  .dot{display:inline-block;width:11px;height:11px;border-radius:50%;vertical-align:middle;margin-right:4px;}
</style>
</head>
<body>
  <a href="00_目次.html" style="display:inline-block;margin:0 0 16px;color:#9fa8da;text-decoration:none;font-size:14px;background:#1a1f3d;padding:7px 16px;border-radius:8px;border:1px solid #2a3158;">← 目次へ戻る</a>
  <h1>📈 AUCが「1に近い」とは、この図でどういうこと?</h1>
  <div class="sub">モデルの良さ（クラスの分離度）を動かすと、曲線の形とAUCが変わる</div>

  <div class="panel">
    <div class="row">
      <div>
        <canvas id="roc" width="320" height="320"></canvas>
        <div class="legend">緑の曲線=ROC曲線　/　<span style="color:#4caf50">緑の面積=AUC</span>　/　点線=でたらめ(AUC0.5)</div>
        <canvas id="strip" width="320" height="90" style="margin-top:12px;"></canvas>
        <div class="legend"><span class="dot" style="background:#ff6e6e"></span>スパム　<span class="dot" style="background:#42a5f5"></span>正常　（分離度が高いほど左右にきれいに分かれる）</div>
      </div>
      <div class="side">
        <div class="ctrl">
          <label>モデルの良さ（クラスの分離度）</label>
          <input id="sep" type="range" min="0" max="1" step="0.01" value="0.6"><span class="v" id="sepV">0.60</span>
        </div>
        <div style="background:#11142b;padding:14px;border-radius:8px;text-align:center;">
          AUC<br><span class="aucbig" id="auc">—</span>
        </div>
        <div class="note" id="note"></div>
      </div>
    </div>
  </div>

<script>
  const rc=document.getElementById('roc'),rx=rc.getContext('2d');
  const sc=document.getElementById('strip'),sxx=sc.getContext('2d');
  // 決定的なばらつき（-0.22..0.22）
  const spread=[-0.22,-0.17,-0.11,-0.06,0,0.06,0.11,0.17,0.22,0.27].map(v=>v*0.9);
  function scores(sep){
    const pos=spread.map(v=>Math.min(0.99,Math.max(0.01,0.5+sep*0.45+v)));
    const neg=spread.map(v=>Math.min(0.99,Math.max(0.01,0.5-sep*0.45+v)));
    return {pos,neg};
  }
  function rates(t,pos,neg){
    let tp=0,fp=0; for(const s of pos)if(s>=t)tp++; for(const s of neg)if(s>=t)fp++;
    return {tpr:tp/pos.length, fpr:fp/neg.length};
  }

  function draw(){
    const sep=+document.getElementById('sep').value;
    document.getElementById('sepV').textContent=sep.toFixed(2);
    const {pos,neg}=scores(sep);
    const pts=[]; for(let t=1.01;t>=-0.01;t-=0.01){const r=rates(t,pos,neg);pts.push([r.fpr,r.tpr]);}
    const sorted=pts.slice().sort((a,b)=>a[0]-b[0]);
    let auc=0;for(let i=1;i<sorted.length;i++)auc+=(sorted[i][0]-sorted[i-1][0])*(sorted[i][1]+sorted[i-1][1])/2;
    // ROC plot
    const W=320,H=320,pad=42; const gx=f=>pad+f*(W-pad-15), gy=v=>H-pad-v*(H-pad-15);
    rx.clearRect(0,0,W,H);
    rx.strokeStyle='#2a3158';rx.beginPath();rx.moveTo(pad,gy(0));rx.lineTo(gx(1),gy(0));rx.moveTo(pad,gy(0));rx.lineTo(pad,gy(1));rx.stroke();
    rx.fillStyle='#5c6bc0';rx.font='11px sans-serif';rx.fillText('FPR→',gx(0.42),gy(0)+24);
    rx.save();rx.translate(14,gy(0.35));rx.rotate(-Math.PI/2);rx.fillText('TPR→',0,0);rx.restore();
    // top-left corner marker
    rx.fillStyle='#ffd54f';rx.font='11px sans-serif';rx.fillText('★完璧の角',gx(0.02),gy(0.97));
    // diagonal
    rx.strokeStyle='#5c6bc0';rx.setLineDash([4,4]);rx.beginPath();rx.moveTo(gx(0),gy(0));rx.lineTo(gx(1),gy(1));rx.stroke();rx.setLineDash([]);
    // area
    rx.fillStyle='rgba(76,175,80,.16)';rx.beginPath();rx.moveTo(gx(0),gy(0));
    for(const[f,tp]of sorted)rx.lineTo(gx(f),gy(tp));rx.lineTo(gx(1),gy(0));rx.closePath();rx.fill();
    // curve
    rx.strokeStyle='#4caf50';rx.lineWidth=2.5;rx.beginPath();
    sorted.forEach(([f,tp],i)=>{i?rx.lineTo(gx(f),gy(tp)):rx.moveTo(gx(f),gy(tp));});rx.stroke();

    document.getElementById('auc').textContent=auc.toFixed(2);
    // strip: show score distribution
    const SW=320,SH=90,sp=24; const px=s=>sp+s*(SW-2*sp);
    sxx.clearRect(0,0,SW,SH);
    sxx.strokeStyle='#2a3158';sxx.beginPath();sxx.moveTo(sp,SH-20);sxx.lineTo(SW-sp,SH-20);sxx.stroke();
    sxx.fillStyle='#5c6bc0';sxx.font='10px sans-serif';sxx.fillText('スコア0',sp-8,SH-6);sxx.fillText('1',SW-sp,SH-6);
    const bins={};
    const all=pos.map(s=>[s,1]).concat(neg.map(s=>[s,0]));
    for(const[s,l]of all){const bx=Math.round(px(s));bins[bx]=bins[bx]||0;const yy=SH-30-bins[bx]*12;bins[bx]++;
      sxx.fillStyle=l===1?'#ff6e6e':'#42a5f5';sxx.beginPath();sxx.arc(px(s),yy,4.5,0,7);sxx.fill();}

    const note=document.getElementById('note');
    if(auc>=0.95) note.innerHTML='<span class="hl">AUCがほぼ1</span>！曲線が<span class="hl">左上の角(★)にピタッと張り付き</span>、緑の面積が四角形をほぼ埋める。下のスコアも赤と青が<span class="hl">きれいに分離</span>。＝優秀なモデル。';
    else if(auc<=0.6) note.innerHTML='<span class="hl">AUCが0.5付近</span>。曲線が点線(対角線)に近く、緑の面積は三角形＝半分だけ。下のスコアも赤と青が<span class="hl">混ざってる</span>。＝でたらめに近い。';
    else note.innerHTML='中くらい。曲線が左上に張り出すほど（緑の面積が増えるほど）AUCは1に近づく。分離度を上げてみて。';
  }
  document.getElementById('sep').addEventListener('input',draw);
  draw();
</script>
</body>
</html>
