<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVM マージン最大化</title>
<style>
  *{box-sizing:border-box;}
  body{font-family:-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;background:#0f1226;color:#e8eaf6;margin:0;padding:24px;line-height:1.6;}
  h1{font-size:22px;margin:0 0 4px;} .sub{color:#9fa8da;font-size:14px;margin-bottom:18px;}
  .panel{background:#1a1f3d;border-radius:14px;padding:20px;margin-bottom:18px;box-shadow:0 4px 16px rgba(0,0,0,.3);}
  .row{display:flex;gap:30px;flex-wrap:wrap;align-items:flex-start;}
  canvas{background:#0a0d1f;border-radius:10px;}
  .side{min-width:240px;display:flex;flex-direction:column;gap:14px;}
  .ctrl label{font-size:13px;color:#9fa8da;display:block;margin-bottom:4px;}
  input[type=range]{width:220px;} .v{color:#fff;font-weight:bold;}
  button{background:#7c4dff;color:#fff;border:none;padding:11px 18px;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer;}
  button:hover{background:#9575ff;}
  .legend{font-size:12px;color:#9fa8da;margin-top:10px;}
  .dot{display:inline-block;width:11px;height:11px;border-radius:50%;vertical-align:middle;margin-right:4px;}
  .box{font-size:14px;background:#11142b;padding:12px 14px;border-radius:8px;}
  .mbig{font-size:30px;font-weight:bold;color:#ffd54f;} .mbig.bad{color:#ff6e6e;}
  .note{font-size:13px;color:#9fa8da;} .hl{color:#ffd54f;font-weight:bold;}
</style>
</head>
<body>
  <a href="00_目次.html" style="display:inline-block;margin:0 0 16px;color:#9fa8da;text-decoration:none;font-size:14px;background:#1a1f3d;padding:7px 16px;border-radius:8px;border:1px solid #2a3158;">← 目次へ戻る</a>
  <h1>📏 SVM — 「一番余裕をもって」境界線を引く</h1>
  <div class="sub">2つのグループ（◯と×）を分ける線を、どれだけ広い間隔（マージン）で引けるか</div>

  <div class="panel">
    <div class="row">
      <div>
        <canvas id="cv" width="440" height="420"></canvas>
        <div class="legend">
          <span class="dot" style="background:#42a5f5"></span>クラスA(◯)
          <span class="dot" style="background:#ff6e6e"></span>クラスB(×)
          <span class="dot" style="background:#ffd54f"></span>境界線
          <span class="dot" style="background:#4caf50"></span>サポートベクター(境界に最も近い点)
        </div>
      </div>
      <div class="side">
        <div class="ctrl"><label>境界線の角度</label><input id="ang" type="range" min="-80" max="80" step="1" value="20"><span class="v" id="angV">20</span>°</div>
        <div class="ctrl"><label>境界線の位置</label><input id="off" type="range" min="-120" max="120" step="1" value="0"><span class="v" id="offV">0</span></div>
        <div class="box">マージン（境界と最も近い点の距離）：<br><span class="mbig" id="margin">—</span></div>
        <button id="best">✨ マージン最大化（SVMの解）</button>
        <div class="note" id="note">スライダーで線を動かすと、両側の点までの間隔（薄黄色の帯＝マージン）が変わる。<span class="hl">この帯が一番太くなる線</span>がSVMの答え。帯の縁に触れる点が<span style="color:#4caf50;font-weight:bold;">サポートベクター</span>。</div>
      </div>
    </div>
  </div>

<script>
  const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
  const W=cv.width,H=cv.height,cx=W/2,cy=H/2;
  // 線形分離可能な2クラス（中心座標系）
  const A=[[-120,-80],[-90,-110],[-140,-30],[-70,-60],[-110,10],[-160,-70],[-95,-20]]; // class +1
  const B=[[90,80],[120,40],[70,110],[140,90],[100,30],[60,60],[150,20]];               // class -1
  const all=A.map(p=>[p,1]).concat(B.map(p=>[p,-1]));

  // line: normal n=(cosθ,sinθ), offset c. signed dist = n·p - c
  function margin(angDeg,off){
    const th=angDeg*Math.PI/180; const nx=Math.cos(th),ny=Math.sin(th);
    let mn=Infinity, okPos=true, okNeg=true;
    for(const[[x,y],lab]of all){
      const d=nx*x+ny*y-off;
      // 符号の向きは2通りありうる（法線がどちら向きでも、両クラスが反対側にあればOK）
      if(Math.sign(d)!==lab) okPos=false;
      if(Math.sign(d)!==-lab) okNeg=false;
      mn=Math.min(mn,Math.abs(d));
    }
    return {m:(okPos||okNeg)?mn:-1, nx, ny};
  }

  function draw(){
    const ang=+document.getElementById('ang').value, off=+document.getElementById('off').value;
    document.getElementById('angV').textContent=ang;
    document.getElementById('offV').textContent=off;
    const {m,nx,ny}=margin(ang,off);
    ctx.clearRect(0,0,W,H);
    const S=(px,py)=>[cx+px, cy-py]; // to screen
    // direction along line = perpendicular to normal
    const dx=-ny, dy=nx;
    // a point on the line: off*normal
    const px0=off*nx, py0=off*ny;
    function linePts(shift){ // shift along normal by 'shift'
      const ox=px0+shift*nx, oy=py0+shift*ny;
      return [S(ox-dx*600,oy-dy*600), S(ox+dx*600,oy+dy*600)];
    }
    // margin band
    if(m>0){
      const [p1,p2]=linePts(m), [p3,p4]=linePts(-m);
      ctx.fillStyle='rgba(255,213,79,.12)';
      ctx.beginPath();ctx.moveTo(p1[0],p1[1]);ctx.lineTo(p2[0],p2[1]);ctx.lineTo(p4[0],p4[1]);ctx.lineTo(p3[0],p3[1]);ctx.closePath();ctx.fill();
      // margin edges dashed
      ctx.strokeStyle='rgba(255,213,79,.5)';ctx.lineWidth=1.5;ctx.setLineDash([5,4]);
      [[p1,p2],[p3,p4]].forEach(([a,b])=>{ctx.beginPath();ctx.moveTo(a[0],a[1]);ctx.lineTo(b[0],b[1]);ctx.stroke();});
      ctx.setLineDash([]);
    }
    // boundary
    const [b1,b2]=linePts(0);
    ctx.strokeStyle=m>0?'#ffd54f':'#ff6e6e';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(b1[0],b1[1]);ctx.lineTo(b2[0],b2[1]);ctx.stroke();
    // support vectors = points at min distance (if separated)
    const tol=4;
    for(const[[x,y],lab]of all){
      const [sxp,syp]=S(x,y);
      const isSV = m>0 && Math.abs(Math.abs(nx*x+ny*y-off)-m)<tol;
      if(isSV){ctx.fillStyle='#4caf50';ctx.beginPath();ctx.arc(sxp,syp,11,0,7);ctx.fill();}
      ctx.fillStyle=lab===1?'#42a5f5':'#ff6e6e';
      ctx.beginPath();ctx.arc(sxp,syp,7,0,7);ctx.fill();
    }
    const el=document.getElementById('margin');
    if(m>0){el.textContent=m.toFixed(0);el.className='mbig';}
    else{el.textContent='分類失敗';el.className='mbig bad';}
    document.getElementById('note').innerHTML = m>0
      ? '薄黄色の帯がマージン。<span class="hl">帯が太いほど"余裕をもって"分けられている</span>＝新しいデータにも強い。縁に触れる緑の点が<span style="color:#4caf50;font-weight:bold;">サポートベクター</span>。'
      : '<span style="color:#ff6e6e;font-weight:bold;">今の線では◯と×を分けられていない！</span>角度と位置を調整して、まず正しく分離してみよう。';
  }
  function best(){
    let bA=0,bO=0,bM=-1;
    for(let a=-80;a<=80;a+=1)for(let o=-150;o<=150;o+=3){const {m}=margin(a,o);if(m>bM){bM=m;bA=a;bO=o;}}
    let a0=+document.getElementById('ang').value,o0=+document.getElementById('off').value,t=0;
    const iv=setInterval(()=>{t+=0.06;if(t>=1){t=1;clearInterval(iv);}
      document.getElementById('ang').value=Math.round(a0+(bA-a0)*t);
      document.getElementById('off').value=Math.round(o0+(bO-o0)*t);draw();},30);
  }
  ['ang','off'].forEach(id=>document.getElementById(id).addEventListener('input',draw));
  document.getElementById('best').addEventListener('click',best);
  draw();
</script>
</body>
</html>
